<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Estudio Avanzada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d12;
            --panel-bg: #16161e;
            --text-main: #f8f8f2;
            --text-muted: #a0a0b0;
            
            /* Paleta Granate y Púrpura */
            --maroon: #800000;
            --maroon-light: #a31515;
            --purple: #6c3483;
            --purple-light: #9b59b6;
            
            --accent-exam: var(--maroon-light);
            --accent-review: var(--purple-light);
            --accent-stats: #c0392b; 
            
            --glow-maroon: rgba(163, 21, 21, 0.4);
            --glow-purple: rgba(155, 89, 182, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- HEADER --- */
        .header {
            background-color: var(--panel-bg);
            border-bottom: 2px solid var(--purple);
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeInDown 0.5s ease-out;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--maroon-light), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #status-message {
            color: var(--text-muted);
            margin-top: 0.3rem;
            font-size: 0.9rem;
        }

        .btn-load {
            background: transparent;
            color: var(--purple-light);
            border: 1px solid var(--purple-light);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-load:hover {
            background: var(--purple-light);
            color: #fff;
            box-shadow: 0 0 15px var(--glow-purple);
        }

        /* --- MENÚ PRINCIPAL --- */
        .menu-container {
            display: flex;
            flex-direction: row;
            flex: 1;
            gap: 2rem;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--panel-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel:hover {
            transform: translateY(-10px) scale(1.02);
        }

        .panel-exam:hover { border-color: var(--maroon-light); box-shadow: 0 15px 35px var(--glow-maroon); }
        .panel-review:hover { border-color: var(--purple-light); box-shadow: 0 15px 35px var(--glow-purple); }
        .panel-stats:hover { border-color: var(--accent-stats); box-shadow: 0 15px 35px rgba(192, 57, 43, 0.4); }

        .panel-icon {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .panel h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .panel p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* --- ELEMENTOS DE LOS MÓDULOS --- */
        button { font-family: inherit; }

        @media (max-width: 900px) {
            .menu-container {
                flex-direction: column;
                padding: 2rem 1.5rem;
            }
            .header-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1>Centro de Estudio</h1>
                <p id="status-message">Cargando base de datos inicial...</p>
            </div>
            <div class="dataset-loader">
                <input type="file" id="file-upload" accept=".json" style="display: none;" onchange="cargarNuevoDataset(event)">
                <button class="btn-load" onclick="document.getElementById('file-upload').click()">
                    📂 Cargar nuevo JSON
                </button>
            </div>
        </div>
    </header>

    <main class="menu-container fade-in" id="main-menu">
        <button class="panel panel-exam" aria-label="Acceder al modo Exámenes" onclick="iniciarModulo('examenes')">
            <div class="panel-icon">📝</div>
            <h2>Exámenes</h2>
            <p>Simula pruebas reales. Evalúa tus conocimientos bajo presión.</p>
        </button>

        <button class="panel panel-review" aria-label="Acceder al modo Repaso" onclick="iniciarModulo('repasar')">
            <div class="panel-icon">📖</div>
            <h2>Repasar</h2>
            <p>Estudia a tu ritmo. Analiza contextos y revisa explicaciones detalladas.</p>
        </button>

        <button class="panel panel-stats" aria-label="Acceder a Estadísticas" onclick="iniciarModulo('estadisticas')">
            <div class="panel-icon">📊</div>
            <h2>Estadísticas</h2>
            <p>Visualiza tu rendimiento y audita tus simulacros pasados.</p>
        </button>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="datos.js"></script> 
    <script src="app.js"></script>
</body>
</html>
